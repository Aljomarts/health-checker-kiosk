<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Self-Check Kiosk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Health Self-Check Kiosk</h1>
  <p>Quick and private BMI check</p>
</header>

<main>
  <section id="formSection">
    <form id="bmiForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="age">Age</label>
      <input type="number" id="age" min="1" max="120" required>

      <label for="sex">Sex</label>
      <select id="sex" required>
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Prefer not to say">Prefer not to say</option>
      </select>

      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" min="1" required>

      <label for="height">Height (cm)</label>
      <input type="number" id="height" min="1" required>

      <button type="submit">Check My BMI</button>
    </form>

    <div id="formError" class="error-msg"></div>
  </section>

  <section id="resultCard" class="hidden">
    <h2 id="resultCategory"></h2>
    <p id="resultBmi"></p>
    <p id="resultMessage"></p>
    <button id="resetBtn" type="button">Check Again</button>
  </section>

  <section id="historySection">
    <h2>Recent Submissions (this session)</h2>
    <ul id="historyList"></ul>
  </section>
</main>

<footer>
  <p>For educational purposes only. Consult a healthcare provider for medical advice.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
